name: Build Pragma TWA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA project
        run: |
          mkdir -p twa-app
          cd twa-app
          bubblewrap init --manifest https://pragma-nine.vercel.app/manifest.json --directory . <<EOF
          com.pragma.stoic
          Pragma
          pragma-nine.vercel.app
          /pragma_app.html
          #03010a
          #03010a
          portrait
          No
          No
          EOF

      - name: Build TWA APK
        run: |
          cd twa-app
          bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pragma-twa.apk
          path: twa-app/app-release-unsigned.apk
          retention-days: 30
