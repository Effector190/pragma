name: Build Pragma APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare web files
        run: |
          mkdir -p public
          cp pragma_app.html public/index.html
          cp icon-512.png public/ || true
          sed -i 's|if (isPaid !== .true.) {[^}]*}||g' public/index.html
          sed -i "s|if (urlParams.get('access') === secretKey)|if (true)|" public/index.html
          sed -i "s|window.location.href = \"index.html\";||" public/index.html

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Fix WebView permissions
        run: |
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pragma-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
