name: Build Pragma TWA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android build tools
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure bubblewrap
        run: |
          JDK_PATH=$(dirname $(dirname $(readlink -f $(which java))))
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JDK_PATH",
            "androidSdkPath": "/usr/local/lib/android/sdk"
          }
          EOF

      - name: Create TWA config
        run: |
          mkdir -p twa-app
          cat > twa-app/twa-manifest.json << 'EOF'
          {
            "packageId": "com.pragma.stoic",
            "host": "pragma-nine.vercel.app",
            "name": "Pragma",
            "launcherName": "Pragma",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#03010a",
            "navigationColor": "#03010a",
            "navigationColorDark": "#03010a",
            "navigationDividerColor": "#03010a",
            "navigationDividerColorDark": "#03010a",
            "backgroundColor": "#03010a",
            "enableNotifications": false,
            "startUrl": "/pragma_app.html",
            "iconUrl": "https://pragma-nine.vercel.app/icon-512.png",
            "maskableIconUrl": "https://pragma-nine.vercel.app/icon-512.png",
            "monochromeIconUrl": "https://pragma-nine.vercel.app/icon-512.png",
            "appVersion": "1",
            "appVersionCode": 1,
            "signingKey": {
              "path": "android.keystore",
              "alias": "android"
            },
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": false,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://pragma-nine.vercel.app/",
            "minSdkVersion": 21,
            "fingerprints": []
          }
          EOF

      - name: Build TWA
        run: |
          cd twa-app
          bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pragma-twa.apk
          path: twa-app/app-release-unsigned.apk
          retention-days: 30
