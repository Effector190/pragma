  <script>
  (function() {
    const urlParams = new URLSearchParams(window.location.search);
    const secretKey = 'ef1ect0r0307'; 
    const isPaid = localStorage.getItem('pragma_access_granted');

    if (urlParams.get('access') === secretKey) {
      localStorage.setItem('pragma_access_granted', 'true');
      const cleanUrl = window.location.origin + window.location.pathname;
      window.history.replaceState({}, document.title, cleanUrl);
      return;
    }

    if (isPaid !== 'true') {
      window.location.href = "index.html";
    }
  })();
  </script>

<script>
/* ... (весь массив QA и функции фильтрации без изменений) ... */

/* --- ОБНОВЛЕННАЯ ЛОГИКА КНОПКИ УСТАНОВКИ (ПРАВКА) --- */
let deferredPrompt;
const installBtn = document.getElementById('pwaInstallBtn');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    // Кнопка уже показана через CSS, здесь мы просто убеждаемся в этом
    installBtn.style.display = 'flex';
});

installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            installBtn.style.display = 'none';
        }
        deferredPrompt = null;
    } else {
        // Если браузер не выдал событие (например, PWA уже установлено)
        alert("Приложение Pragma уже установлено или готово к работе оффлайн.");
    }
});

window.addEventListener('appinstalled', () => {
    installBtn.style.display = 'none';
});

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // Поднял версию до 8, чтобы сбросить кэш иконки
      navigator.serviceWorker.register('/sw.js?v=8').catch(err => console.log('SW error', err));
    });
}
</script>
